<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Accueil - Lignes de tram</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  <style>
    body {
      display: flex;
      flex-direction: column;
      width: 100vw;
      height: 100vh;
      align-items: center;
      justify-content: center;
    }
    h1 {
      color: white;
      font-size: 3em;
    }
    #lignes {
      width: 80vw;
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: space-around;
    }
    button {
      border-radius: 100%;
      font-size: 20px;
      background-color: white;
      border: none;
      padding: 20px;
      font-family: "Roboto", sans-serif;
      font-weight: 900;
      color: black;
      max-width: 64px;
      max-height: 64px;
    }
    #siri, button {
      padding: 20px;
    }
    img {
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>
  <h1>Choisissez une ligne</h1>
  <div id="lignes"></div>
  <div id="siri"><button onclick="javascript:location.href='siri.html'"><img src="img/location.png" /></button></div>
  <script src="js/main.js"></script>
</body>
</html>
